spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # 도커 컨테이너 내부 통신을 위해 서비스명(mysql-server) 사용 가능
    url: jdbc:mysql://${DB_URL:mysql-server}:3306/gilmok_db
    username: ${DB_USERNAME} # 시크릿에서 주입됨
    password: ${DB_PASSWORD} # 시크릿에서 주입됨
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate # 운영용: 스키마 변경 금지 (안전제일)
    properties:
      hibernate:
        format_sql: false # 로그 간소화
