spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # [수정] URL을 조립하지 않고, 환경변수(DB_URL)를 그대로 사용
    # GitHub Secrets의 DB_URL에 "jdbc:mysql://..." 전체가 들어있어야 함
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # [추가] Redis 설정 (운영 환경)
  data:
    redis:
      url: ${REDIS_URL}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:2000ms}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:true} # 기본값 true
      lettuce:
        pool:
          enabled: true
          max-active: ${REDIS_POOL_MAX_ACTIVE:50}
          max-idle: ${REDIS_POOL_MAX_IDLE:20}
          min-idle: ${REDIS_POOL_MIN_IDLE:10}
          max-wait: 1000ms                     # ✅ 추가
        shutdown-timeout: 200ms

  jpa:
    hibernate:
      ddl-auto: validate # 운영에선 스키마 변경 금지
    properties:
      hibernate:
        format_sql: false # 운영 로그 깔끔하게
        show_sql: false   # 쿼리 로그도 끄는 것 권장 (성능/보안)

  ai:
    google:
      genai:
        project-id: ${GEMINI_PROJECT_ID}
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: "gemini-2.5-flash"

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
  admitted-ttl-seconds: ${ADMITTED_TTL_SECONDS:300}

# Swagger에서 Auth API 함께 보이게 (같은 서버·같은 호스트 기준)
auth:
  api-docs-url: ${AUTH_API_DOCS_URL:http://auth-server:9000/v3/api-docs}

metrics:
  prometheus:
    url: ${PROMETHEUS_URL:http://158.180.78.71:9090}

management:
  health:
    rabbit:
      enabled: false

resilience4j:
  circuitbreaker:
    instances:
      redis-admission:          # 기존
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      redis-policy-cache:       # ✅ 새로 추가
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
      redis-queue:              # ✅ 새로 추가
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        ignore-exceptions:
          - kr.gilmok.common.exception.CustomException
          - java.lang.IllegalArgumentException
      redis-queue-verify:
        # verifyQueueAccess() 단독 사용
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        ignore-exceptions:
          - kr.gilmok.common.exception.CustomException