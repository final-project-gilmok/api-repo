spring:
  application:
    name: gilmok-api
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  profiles:
    active: dev

server:
  port: 8081
  servlet:
    context-path: /api

queue:
  admission-rps: 10
  default-event-id: default
  admitted-ttl-seconds: 300
