spring:
  application:
    name: api
  profiles:
    active: dev # 기본은 dev로 실행 (운영에선 -Dspring.profiles.active=prod 로 덮어쓰기)
  data:
    redis:
      ssl:
        enabled: true       # ✅ ssl은 여기까지
      timeout: 2000ms       # ✅ redis 바로 하위 (ssl 밖으로 빼야 함)
      lettuce: # ✅ redis 바로 하위 (ssl 밖으로 빼야 함)
        pool:
          enabled: true
          max-active: 30
          max-idle: 15
          min-idle: 5
          max-wait: 1000ms
        shutdown-timeout: 200ms

server:
  port: 8081
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto

# 큐 관련 설정도 공통이라면 여기에 (환경별로 다르면 아래로 이동)
queue:
  admission-rps: ${QUEUE_ADMISSION_RPS:10}
  default-event-id: 1
  admitted-ttl-seconds: ${QUEUE_ADMITTED_TTL_SECONDS:300}
  grace-period-seconds: ${QUEUE_GRACE_PERIOD_SECONDS:180}
  rate-limit:
    requests-per-second: ${QUEUE_RATE_LIMIT_RPS:10}
    window-ms: ${QUEUE_RATE_LIMIT_WINDOW_MS:1000}

reservation:
  seat-lock-ttl-seconds: 300
  max-quantity: 4

# auth-repo OpenAPI 스펙 URL (같은 Swagger UI에서 API+Auth 함께 보기용, 비우면 api만 표시)
auth:
  api-docs-url: ${AUTH_API_DOCS_URL:http://localhost:9000/v3/api-docs}

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics # 메트릭은 항상 노출
resilience4j:
  circuitbreaker:
    instances:
      redis-admission:
        sliding-window-size: 10
        failure-rate-threshold: 50       # 50% 실패 시 OPEN
        wait-duration-in-open-state: 10s # 10초 후 HALF-OPEN 시도
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80