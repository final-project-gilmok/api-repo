spring:
  application:
    name: auth-service

  datasource:
    # 1. DB ??: Docker? ?? MySQL? ??(localhost)?? ??
    url: jdbc:mysql://localhost:3307/gilmok_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    # 2. ?? ??: root ??? ??? ???? ??
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # MySQL 8.0 ?? ??? ???? Dialect ?? ?? (?? ?? ??)

  # 4. Redis ??: ?? ?? ? ?? ???
