spring:
  application:
    name: api
  profiles:
    active: dev # 기본은 dev로 실행 (운영에선 -Dspring.profiles.active=prod 로 덮어쓰기)

server:
  port: 8081
  servlet:
    context-path: /api

# 큐 관련 설정도 공통이라면 여기에 (환경별로 다르면 아래로 이동)
queue:
  admission-rps: 10
  default-event-id: default
  admitted-ttl-seconds: 300
