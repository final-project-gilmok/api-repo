name: Build & Push to GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target (oci or aws)'
        required: false
        default: 'oci'
        type: choice
        options:
          - oci
          - aws

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/api-repo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Set Deploy Target
        id: set-target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "DEPLOY_TARGET=${{ inputs.target }}" >> $GITHUB_ENV
          else
            echo "DEPLOY_TARGET=oci" >> $GITHUB_ENV
          fi

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Build and Push Frontend (OCI)
        if: success() && env.DEPLOY_TARGET == 'oci'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_NAME }}/frontend:latest-oci
          build-args: |
            VITE_API_BASE_URL=${{ secrets.OCI_FRONTEND_URL }}
            VITE_AUTH_BASE_URL=${{ secrets.OCI_FRONTEND_URL }}
            VITE_GRAFANA_BASE_URL=${{ secrets.OCI_FRONTEND_URL }}/grafana
            VITE_GRAFANA_DASHBOARD_UID=${{ secrets.VITE_GRAFANA_DASHBOARD_UID }}

      - name: Build and Push Frontend (AWS)
        if: success() && env.DEPLOY_TARGET == 'aws'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_NAME }}/frontend:latest-aws
          build-args: |
            VITE_API_BASE_URL=${{ secrets.AWS_FRONTEND_URL }}
            VITE_AUTH_BASE_URL=${{ secrets.AWS_FRONTEND_URL }}
            VITE_GRAFANA_BASE_URL=${{ secrets.OCI_FRONTEND_URL }}/grafana
            VITE_GRAFANA_DASHBOARD_UID=${{ secrets.VITE_GRAFANA_DASHBOARD_UID }}

      - name: Trigger Deploy Repo (Backend)
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
          repository: final-project-gilmok/deploy-repo
          event-type: update-image
          client-payload: '{"image_tag": "latest", "service_name": "api-server", "target": "${{ env.DEPLOY_TARGET }}"}'

      - name: Trigger Deploy Repo (Frontend)
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
          repository: final-project-gilmok/deploy-repo
          event-type: update-image
          client-payload: '{"image_tag": "latest-${{ env.DEPLOY_TARGET }}", "service_name": "frontend-server", "target": "${{ env.DEPLOY_TARGET }}"}'
