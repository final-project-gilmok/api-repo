name: Build & Push to GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target (oci or aws)'
        required: false
        default: 'oci'
        type: choice
        options:
          - oci
          - aws

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/api-repo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: ${{ inputs.target || 'oci' }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ 기존 스텝 제거하고 이걸로 교체
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      # ✅ 신규 추가
      - name: Validate frontend build args
        env:
          VITE_API_BASE_URL: ${{ env.DEPLOY_TARGET == 'aws' && secrets.AWS_FRONTEND_URL || secrets.OCI_FRONTEND_URL }}
          VITE_AUTH_BASE_URL: ${{ env.DEPLOY_TARGET == 'aws' && secrets.AWS_FRONTEND_URL || secrets.OCI_FRONTEND_URL }}
          VITE_GRAFANA_BASE_URL: ${{ env.DEPLOY_TARGET == 'aws' && secrets.AWS_MONITORING_HOST || secrets.OCI_MONITORING_HOST }}
          VITE_GRAFANA_DASHBOARD_UID: ${{ secrets.VITE_GRAFANA_DASHBOARD_UID }}
        run: |
          test -n "$VITE_API_BASE_URL" || { echo "VITE_API_BASE_URL is required"; exit 1; }
          test -n "$VITE_AUTH_BASE_URL" || { echo "VITE_AUTH_BASE_URL is required"; exit 1; }
          test -n "$VITE_GRAFANA_BASE_URL" || { echo "VITE_GRAFANA_BASE_URL is required"; exit 1; }
          test -n "$VITE_GRAFANA_DASHBOARD_UID" || { echo "VITE_GRAFANA_DASHBOARD_UID is required"; exit 1; }

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_NAME }}/frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ env.DEPLOY_TARGET == 'aws' && secrets.AWS_FRONTEND_URL || secrets.OCI_FRONTEND_URL }}
            VITE_AUTH_BASE_URL=${{ env.DEPLOY_TARGET == 'aws' && secrets.AWS_FRONTEND_URL || secrets.OCI_FRONTEND_URL }}
            VITE_GRAFANA_BASE_URL=${{ env.DEPLOY_TARGET == 'aws' && secrets.AWS_MONITORING_HOST || secrets.OCI_MONITORING_HOST }}
            VITE_GRAFANA_DASHBOARD_UID=${{ secrets.VITE_GRAFANA_DASHBOARD_UID }}


      - name: Trigger Deploy Repo (Backend)
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
          repository: final-project-gilmok/deploy-repo
          event-type: update-image
          client-payload: '{"image_tag": "latest", "service_name": "api-server", "target": "${{ env.DEPLOY_TARGET }}"}'

      # ✅ 추가
      - name: Trigger Deploy Repo (Frontend)
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
          repository: final-project-gilmok/deploy-repo
          event-type: update-image
          client-payload: '{"image_tag": "latest", "service_name": "frontend-server", "target": "${{ env.DEPLOY_TARGET }}"}'
